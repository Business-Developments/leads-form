<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lead Form</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <div class="card shadow p-4">
    <h2 class="mb-4">Lead Tracker</h2>

    <form id="leadForm">
      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>

      <!-- Mobile -->
      <div class="mb-3">
        <label class="form-label">Mobile</label>
        <input type="text" id="mobile" class="form-control" required>
      </div>

      <!-- Address -->
      <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea id="address" class="form-control" rows="3" required></textarea>
      </div>

      <!-- Date -->
      <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" id="date" class="form-control" required>
      </div>

      <!-- Notes -->
      <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea id="notes" class="form-control" rows="3"></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary">Save Lead</button>
    </form>
  </div>
  <div id="leadList" class="mt-4"></div>


  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD1k3vMvPt3Rqi8JgAl56DrO82vXn3WbAo",
    authDomain: "nicrm-1afa3.firebaseapp.com",
    projectId: "nicrm-1afa3",
    storageBucket: "nicrm-1afa3.firebasestorage.app",
    messagingSenderId: "1087524542055",
    appId: "1:1087524542055:web:c46c43ba9849e3552566c2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Save Lead
  document.getElementById("leadForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      await addDoc(collection(db, "Leads"), {
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        address: document.getElementById("address").value,
        date: document.getElementById("date").value,
        notes: document.getElementById("notes").value,
        createdAt: new Date()
      });
      alert("✅ Lead Saved Successfully!");
      document.getElementById("leadForm").reset();
      loadLeads(); // refresh list after save
    } catch (error) {
      alert("❌ Error: " + error);
    }
  });

  // Fetch & Display Leads
  async function loadLeads() {
    const querySnapshot = await getDocs(collection(db, "Leads"));
    const leadList = document.getElementById("leadList");
    leadList.innerHTML = ""; // clear old cards

    querySnapshot.forEach((doc) => {
      const lead = doc.data();
      leadList.innerHTML += `
        <div class="card mb-3 shadow">
          <div class="card-body">
            <h5 class="card-title">${lead.name}</h5>
            <p class="card-text">
              📱 ${lead.mobile}<br>
              🏠 ${lead.address}<br>
              📅 ${lead.date}<br>
              📝 ${lead.notes || "No notes"}
            </p>
          </div>
        </div>
      `;
    });
  }

  // Load leads on page load
  loadLeads();
</script>
  
</body>
</html>
